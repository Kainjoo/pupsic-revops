<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pupsic — RevOps Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#131022',
            paper: '#fafafd',
            paper2: '#efecf6',
            mute: '#87848f',
            line: 'rgba(19,16,34,0.10)',
            line2: 'rgba(19,16,34,0.06)',
            accent: '#8D0AF5',
            accentSoft: '#f3e0ff',
            pink: '#FD89FF',
            pinkSoft: '#ffe6ff',
            deep: '#3E0CB7',
            ok: '#2f7d3a',
            warn: '#b45309',
            bad: '#b91c1c',
          },
          fontFamily: {
            sans: ['Montserrat', 'ui-sans-serif', 'system-ui'],
            display: ['Montserrat', 'ui-sans-serif', 'system-ui'],
            mono: ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        }
      }
    };
  </script>

  <style>
    html, body, #root { height: 100%; }
    body {
      background: #fafafd;
      color: #131022;
      font-family: 'Montserrat', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
    .display { font-family: 'Montserrat', sans-serif; letter-spacing: -0.04em; font-weight: 300; }
    .mono { font-family: 'Montserrat', ui-sans-serif, system-ui, sans-serif; font-weight: 500; letter-spacing: 0.04em; }
    .hair { border-color: rgba(19,16,34,0.10); }

    /* ── Strict type scale: 3 sizes per screen + mono caption ───────
       Rule: never use more than 3 of these on a single screen.
       t-hero     — primary outcome (one per screen, 32px)
       t-num      — KPI values, secondary outcomes (18px)
       t-body     — body, labels, captions (12.5px)
       t-caption  — mono uppercase eyebrows (10.5px) — visually distinct family
       Weight rule: medium (500) max for numbers. NEVER bold (700).
    */
    .t-hero    { font-size: 32px; line-height: 1.05; font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
    .t-num     { font-size: 18px; line-height: 1.05; font-weight: 500; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
    .t-body    { font-size: 12.5px; line-height: 1.5; font-weight: 400; }
    .t-bodyhi  { font-size: 12.5px; line-height: 1.5; font-weight: 500; }
    .t-caption { font-size: 10.5px; line-height: 1; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Number transition: when a key changes, do a subtle fade-slide */
    @keyframes numpop {
      0% { opacity: 0.0; transform: translateY(2px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .num-anim { animation: numpop 220ms ease-out; }

    /* Allocation bar — entrance grow + transition on change */
    @keyframes barGrow {
      0%   { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    .bar-grow {
      transform-origin: left center;
      animation: barGrow 720ms cubic-bezier(.2,.7,.2,1) both;
      transition: width 480ms cubic-bezier(.2,.7,.2,1);
    }

    /* Slider — minimal Swiss */
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      background: transparent; width: 100%; height: 22px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      background: rgba(19,16,34,0.10); height: 2px; border-radius: 0;
    }
    input[type=range]::-moz-range-track {
      background: rgba(19,16,34,0.10); height: 2px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 9999px;
      background: #131022; margin-top: -6px; border: 2px solid #fafafd;
      cursor: pointer;
    }
    input[type=range].accent::-webkit-slider-thumb { background: #8D0AF5; }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 9999px;
      background: #131022; border: 2px solid #fafafd;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.9s linear infinite; }

    /* Scrollbars in media plan */
    .nice-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
    .nice-scroll::-webkit-scrollbar-thumb { background: rgba(19,16,34,0.18); border-radius: 99px; }
    .nice-scroll::-webkit-scrollbar-track { background: transparent; }

    /* Modal fade */
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadein 180ms ease-out; }
    .slide-up { animation: slideup 220ms cubic-bezier(.2,.7,.2,1); }

    /* Toast */
    @keyframes toastin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .toast { animation: toastin 200ms ease-out; }

    /* Logo dot */
    .pupdot {
      width: 9px; height: 9px; border-radius: 9999px;
      background: #8D0AF5; display: inline-block;
      box-shadow: 0 0 0 2px #fafafd, 0 0 0 3px rgba(141,10,245,0.22);
    }
    .pupdot-pink {
      background: #FD89FF;
      box-shadow: 0 0 0 2px #fafafd, 0 0 0 3px rgba(253,137,255,0.32);
    }

    /* Hide number input spinners */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Selection */
    ::selection { background: #8D0AF5; color: #fff; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
